<!DOCTYPE html>
<html lang="ko" ng-app="RunnerApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트자이온 생존기</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root { --danger: #e74c3c; --success: #2ecc71; --gold: #f1c40f; --office: #34495e; --panel: #2c3e50; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1a; font-family: 'Malgun Gothic', sans-serif; color: #fff; display: flex; align-items: center; justify-content: center; }
        
        #main-layout {
            display: flex;
            flex-direction: column; /* 세로로 쌓기 */
            align-items: center;    /* 가운데 정렬 */
            gap: 15px;
            width: 100%;
        }
        
        #game-area {
            display: flex;         /* 가로로 배치 (게임 + 랭킹) */
            gap: 20px;
            align-items: flex-start;
        }
        
        #game-container { position: relative; width: 800px; height: 400px; background: #000; border: 4px solid #444; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* 하단 업무 로그 바 */
        #work-log-bar {
            width: 800px;         /* 게임 화면 너비인 800px에 맞춤 */
            height: 70px;         /* 높이 약간 키움 */
            background: #2c3e50;
            border: 3px solid var(--gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            box-sizing: border-box;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            /* 사이드 패널 때문에 왼쪽으로 쏠리는 걸 방지하기 위해 마진 조정 */
            margin-right: 270px;  /* 사이드 패널(250px) + 간격(20px) 만큼 오른쪽 마진을 줘서 게임창 아래에 맞춤 */
        }
        
        .log-label {
            background: var(--gold);
            color: #000;
            padding: 6px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            margin-right: 20px;
            white-space: nowrap;
        }
        
        .log-text {
            color: #fff;
            font-size: 22px;      /* 글씨 크기를 키워서 시원하게 보이게 함 */
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #side-panel { width: 250px; background: var(--panel); border: 4px solid #444; padding: 15px; box-sizing: border-box; height: 400px; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .promotion-modal { background: #fff; color: #333; padding: 20px; border-radius: 5px; width: 80%; border: 5px double var(--office); }
        
        input { padding: 12px; border-radius: 5px; width: 220px; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 30px; background: var(--office); color: white; border: none; cursor: pointer; font-weight: bold; }

        .hud { position: absolute; top: 10px; left: 10px; width: 95%; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; }
        .hp-bar { width: 150px; height: 12px; background: rgba(0,0,0,0.5); border: 1px solid #fff; margin-top: 5px; }
        .hp-fill { height: 100%; background: var(--success); transition: width 0.2s; }
    </style>
</head>
<body ng-controller="GameController">

    <div id="main-layout">
        <div id="game-area">
            <div id="game-container">
                <canvas id="gameCanvas" width="800" height="400"></canvas>

                <!-- HUD -->
                <div class="hud" ng-if="playerName && gameState === 'PLAYING'">
                    <div>
                        <strong>{{playerName}}</strong> ({{levelName}})
                        <div class="hp-bar"><div class="hp-fill" ng-style="{'width': hp + '%'}"></div></div>
                    </div>
                    <div style="text-align: right; color: var(--gold); font-size: 24px; font-weight: bold;">{{score}}</div>
                </div>

                <!-- 오버레이들 (기존과 동일) -->
                <div class="overlay" ng-if="!playerName">
                    <h1 style="color: var(--gold);">신규 입사 신청서</h1>
                    <input type="text" id="playerNameInput" placeholder="성함 (최대 8자)" maxlength="8">
                    <button ng-click="saveName()">사원증 발급 (입사)</button>
                </div>

                <div class="overlay" ng-show="playerName && gameState === 'START'">
                    <h1>오늘의 업무 대기 중</h1>
                    <button ng-click="startGame()">업무 시작 (Enter)</button>
                </div>

                <div class="overlay" ng-if="gameState === 'PROMOTION'">
                    <div class="promotion-modal">
                        <h2>[인사 발령] {{levelName}}</h2>
                        <p>{{levelTask}}</p>
                        <button ng-click="resumeGame()">확인</button>
                    </div>
                </div>

                <div class="overlay" ng-if="gameState === 'GAMEOVER'">
                    <h1 style="color:var(--danger);">권고사직</h1>
                    <p>"{{lastWords}}"</p>
                    <h2>성과: {{score}}</h2>
                    <button ng-click="startGame()">재입사 지원</button>
                </div>
            </div>

            <div id="side-panel">
                <div style="text-align:center; color:var(--gold); border-bottom:1px solid #666; padding-bottom:10px; margin-bottom:10px;">🏆 명예의 전당</div>
                <div ng-repeat="r in rankings | limitTo: 10" style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;">
                    <span>{{$index + 1}}. {{r.name}}</span>
                    <span>{{r.score}}</span>
                </div>
            </div>
           
        </div>
         <!-- 하단 업무 로그 바 -->
            <div id="work-log-bar">
                <div class="log-label">진행중인 업무</div>
                <div class="log-text">{{currentTask}}</div>
            </div>
        
    </div>

    <script>
        const app = angular.module('RunnerApp', []);

        app.controller('GameController', function($scope) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            $scope.playerName = localStorage.getItem('runner_name');
            $scope.rankings = JSON.parse(localStorage.getItem('runner_rankings') || '[]');
            $scope.gameState = 'START';
            $scope.currentTask = "업무를 시작하려면 [업무 시작] 버튼을 누르세요.";
            $scope.level = 1; $scope.hp = 100; $scope.score = 0;

            const levelData = [
                { 
                    title: "신입 (사원/대리)", 
                    bg: "#2c3e50", // 차분한 새벽 출근길
                    task: "시키는 건 다 합니다. 아직은 의욕이 앞서며, 퇴근 후 운동도 꿈꿉니다." 
                },
                { 
                    title: "주니어 (과장)", 
                    bg: "#1e3799", // 업무가 몰아치는 오전
                    task: "구글링과 챗GPT가 나의 영혼입니다. 슬슬 내 코드가 부끄러워지기 시작합니다." 
                },
                { 
                    title: "미들 (차장)", 
                    bg: "#0c2461", // 피크 타임의 오후
                    task: "밑에서 치이고 위에서 눌립니다. 버그를 고치면 버그가 두 개 생기는 마법을 부립니다." 
                },
                { 
                    title: "시니어 (팀장/부장)", 
                    bg: "#b71540", // 노을 지는 야근의 시작
                    task: "코딩보다 엑셀과 PPT를 더 많이 봅니다. 회의실에서 탈출하는 법을 연구합니다." 
                },
                { 
                    title: "수석 (본부장/이사)", 
                    bg: "#4b6584", // 늦은 밤 사무실
                    task: "모든 코드가 엉망으로 보이지만 고칠 기운이 없습니다. 인자한 미소로 위기를 넘깁니다." 
                },
                { 
                    title: "최종 보스 (CTO)", 
                    bg: "#000000", // 심야, 모든 것이 끝난 암흑
                    task: "자, 5분이면 되는 거 아녜요? (전 직원의 적이자 끝판왕 단계)" 
                }
            ];

            // [점프] 짧고 강렬하게 치고 들어오는 기술적 문제/잔업
            const JUMP_LIST = [
                "Git 충돌 발생", "NullPointer 에러", "AWS 서버 터짐", "IE 브라우저 대응", 
                "CSS 1px 어긋남", "배포 후 에러 감지", "슬랙 알림 폭탄", "DB 커넥션 부족",
                "로그에 찍힌 에러", "하드코딩의 유혹", "레거시 코드 분석", "npm 보안 경고",
                "API 응답 500 에러", "로컬에선 됐는데요", "빌드 스크립트 오류", "의존성 지옥(Hell)",
                "사무실 자리 이동", "사내 망 보안 점검", "토큰 만료(401)", "정기 점검 공지"
            ];
            
            // [슬라이딩] 몸을 낮춰야 지나가는 회의/보고/사회생활
            const SLIDE_LIST = [
                "긴급 TFT 소집", "주간 보고서 작성", "운영 위원회 참석", "보안 교육 미이수",
                "불필요한 티타임", "점심 회식(강제)", "강제 워크샵 준비", "VPN 연결 끊김",
                "PM과의 면담", "타 부서 협조 요청", "연말 성과 평가", "사무실 대청소",
                "기획안 독해 중", "품의서 결재 대기", "사내 메신저 점검", "개발 표준 가이드",
                "화면 설계서 수정", "중간 검수 미팅", "자바 버전 업데이트", "근태 기록 누락"
            ];
            
            // [보스/대형] 피하기 어렵고 데미지가 큰 고객사/상사/대형 사고
            const BOSS_LIST = [
                "고객사 현장 지원", "기능 전면 재검토", "ASAP: 내일 오픈", "운영 DB 삭제 실수",
                "대표님 지시 사항", "기획서 통째로 변경", "모바일도 당연히 되죠?", "기존 영향도 0% (거짓)",
                "검수 기간(금금금)", "솔루션 소스 유실", "이거 5분 컷이죠?", "로그가 안 남았어요",
                "보안 취약점 발견", "동시 접속자 폭주", "상용 서버 롤백", "기능 다 빼고 일정 당기기",
                "인수인계 문서 없음", "타 부서 잘못 덤탱이", "외주 업체 먹튀", "고객사 담당자 변경"
            ];

            let player = { x: 80, y: 300, w: 30, h: 55, dy: 0, jumpPower: 14, gravity: 0.8, jumpCount: 0, isSliding: false };
            let obstacles = [];
            let gameSpeed = 6;
            let frameCount = 0;
            let animationId;

            $scope.saveName = function() {
                const name = document.getElementById('playerNameInput').value.trim();
                if (name) { $scope.playerName = name; localStorage.setItem('runner_name', name); $scope.gameState = 'START'; }
            };

            function initGame() {
                $scope.hp = 100; $scope.score = 0; $scope.level = 1; gameSpeed = 6;
                $scope.currentTask = "업무 준비 완료!";
                obstacles = []; player.y = 300; player.dy = 0; frameCount = 0;
                $scope.updateLevel();
            }

            $scope.updateLevel = function() {
                const d = levelData[Math.min($scope.level - 1, levelData.length - 1)];
                $scope.levelName = d.title; $scope.levelTask = d.task;
            };

            $scope.startGame = function() { initGame(); $scope.gameState = 'PLAYING'; update(); };
            $scope.resumeGame = function() { $scope.gameState = 'PLAYING'; update(); };

            function spawnObstacle() {
                const isBoss = Math.random() < 0.25;
                const isSlide = !isBoss && Math.random() < 0.35;
                
                let text = isBoss ? BOSS_LIST[Math.floor(Math.random() * BOSS_LIST.length)] : 
                          (isSlide ? SLIDE_LIST[Math.floor(Math.random() * SLIDE_LIST.length)] : 
                           JUMP_LIST[Math.floor(Math.random() * JUMP_LIST.length)]);
            
                // 글자 길이를 측정해서 박스 너비를 결정합니다.
                ctx.font = "bold 16px 'Malgun Gothic'";
                const textWidth = ctx.measureText(text).width;
                const boxWidth = textWidth + 30; // 양옆 여백 추가
            
                obstacles.push({
                    x: canvas.width + 50, 
                    y: isSlide ? 230 : (isBoss ? 210 : 310), // 높이 살짝 조정
                    w: boxWidth, 
                    h: isBoss ? 130 : 50, 
                    text: text, 
                    isBoss: isBoss, 
                    isSlide: isSlide,
                    speed: gameSpeed, 
                    dmg: isBoss ? 35 : 15
                });
            }

            function update() {
                if ($scope.gameState !== 'PLAYING') return;

                player.dy += player.gravity;
                player.y += player.dy;
                const groundY = player.isSliding ? 330 : 305;
                if (player.y > groundY) { player.y = groundY; player.dy = 0; player.jumpCount = 0; }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.x -= o.speed;

                    // 충돌 체크
                    const hitboxY = player.isSliding ? player.y + 20 : player.y;
                    const hitboxH = player.isSliding ? 20 : 55;
                    if (player.x < o.x + o.w && player.x + 30 > o.x && hitboxY < o.y + o.h && hitboxY + hitboxH > o.y) {
                        $scope.hp -= o.dmg;
                        $scope.lastWords = o.text;
                        obstacles.splice(i, 1);
                        if ($scope.hp <= 0) gameOver();
                        $scope.$apply();
                        continue;
                    }

                    // 장애물 통과 완료! (여기서 하단 로그 업데이트)
                    if (o.x + o.w < 0) {
                        let emoji = "✅";
                        if (o.isBoss) emoji = "🔥 위기탈출:";
                        else if (o.isSlide) emoji = "🧘 존버완료:";
                        
                         $scope.currentTask = `${emoji} [${o.text}] 처리 완료!`;
                        const logBar = document.querySelector('.log-text');
                        logBar.style.color = '#2ecc71'; // 성공 시 초록색으로 잠깐 변경
                        setTimeout(() => { logBar.style.color = '#fff'; }, 500);
                        
                        obstacles.splice(i, 1);
                        $scope.score += 10;
                        if ($scope.score > 0 && $scope.score % 100 === 0) { 
                            if ($scope.level < levelData.length) { // 데이터가 있는 만큼만 레벨업
                                $scope.gameState = 'PROMOTION'; 
                                $scope.level++; 
                                gameSpeed += 1.5; 
                                $scope.updateLevel();
                            }
                        }
                        $scope.$apply();
                    }
                }

                let spawnInterval = Math.max(30, 80 - ($scope.level * 8)); // 레벨이 높을수록 장애물이 더 자주 나옴
                if (frameCount % spawnInterval === 0) spawnObstacle();

                frameCount++;
                draw();
                animationId = requestAnimationFrame(update);
            }

            function draw() {
              const d = levelData[Math.min($scope.level - 1, levelData.length - 1)];
                    ctx.fillStyle = d.bg; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 바닥 (아스팔트/사무실 바닥 느낌)
                    ctx.fillStyle = "#34495e"; 
                    ctx.fillRect(0, 360, canvas.width, 40);
                // 플레이어
                ctx.fillStyle = player.isSliding ? "#e67e22" : "#3498db";
                ctx.fillRect(player.x, player.y, player.isSliding ? 40 : 30, player.isSliding ? 25 : 55);

                // 장애물 그리기
               obstacles.forEach(o => {
                    let boxColor, textColor, borderColor;
                    
                    if (o.isBoss) {
                        boxColor = "#e74c3c"; // 긴급 (강렬한 빨강)
                        textColor = "#ffffff";
                        borderColor = "#000000";
                    } else if (o.isSlide) {
                        boxColor = "#f1c40f"; // 회의/보고 (노랑 포스트잇)
                        textColor = "#000000";
                        borderColor = "#d35400";
                    } else {
                        boxColor = "#ecf0f1"; // 일반 업무 (하얀 서류)
                        textColor = "#2c3e50";
                        borderColor = "#95a5a6";
                    }
            
                    // 박스 본체 그리기
                    ctx.fillStyle = boxColor;
                    ctx.fillRect(o.x, o.y, o.w, o.h);
                    
                    // 박스 테두리 (입체감)
                    ctx.strokeStyle = borderColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(o.x, o.y, o.w, o.h);
            
                    // 글자 그리기 (구체적인 업무 내용 복구)
                    ctx.fillStyle = textColor;
                    ctx.font = "bold 16px 'Malgun Gothic'";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    // 글자 외곽선 (작은 글씨 가독성 확보)
                    if (o.isBoss) {
                        ctx.strokeStyle = "rgba(0,0,0,0.5)";
                        ctx.lineWidth = 1;
                        ctx.strokeText(o.text, o.x + o.w/2, o.y + o.h/2);
                    }
            
                    ctx.fillText(o.text, o.x + o.w/2, o.y + o.h/2);
                    
                    // 보스 장애물인 경우 상단에 'URGENT' 태그 추가
                    if (o.isBoss) {
                        ctx.fillStyle = "#000";
                        ctx.fillRect(o.x, o.y, 60, 20);
                        ctx.fillStyle = "#fff";
                        ctx.font = "bold 10px Arial";
                        ctx.fillText("URGENT", o.x + 30, o.y + 10);
                    }
                });
            }

            function gameOver() {
                $scope.gameState = 'GAMEOVER';
                cancelAnimationFrame(animationId);
                $scope.rankings.push({ name: $scope.playerName, score: $scope.score });
                $scope.rankings.sort((a, b) => b.score - a.score);
                localStorage.setItem('runner_rankings', JSON.stringify($scope.rankings.slice(0, 10)));
            }

            window.addEventListener('keydown', e => {
                if (e.code === 'Enter') {
                    if ($scope.gameState === 'START' || $scope.gameState === 'GAMEOVER') $scope.$apply(() => $scope.startGame());
                    if ($scope.gameState === 'PROMOTION') $scope.$apply(() => $scope.resumeGame());
                }
                if ($scope.gameState === 'PLAYING') {
                    if (e.code === 'Space' && player.jumpCount < 2) { player.dy = -player.jumpPower; player.jumpCount++; player.isSliding = false; }
                    if (e.code === 'ArrowDown') player.isSliding = true;
                }
            });
            window.addEventListener('keyup', e => { if (e.code === 'ArrowDown') player.isSliding = false; });
        });
    </script>
</body>
</html>
