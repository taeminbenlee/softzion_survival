<!DOCTYPE html>
<html lang="ko" ng-app="RunnerApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트자이온 생존게임</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root { --danger: #e74c3c; --success: #2ecc71; --gold: #f1c40f; --office: #34495e; --panel: #2c3e50; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1a; font-family: 'Malgun Gothic', sans-serif; color: #fff; display: flex; align-items: center; justify-content: center; }
        
        #main-layout { display: flex; gap: 20px; align-items: flex-start; max-width: 1100px; width: 95%; }
        #game-container { position: relative; width: 800px; height: 400px; background: #000; border: 4px solid #444; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }

        #side-panel { width: 250px; background: var(--panel); border: 4px solid #444; padding: 15px; box-sizing: border-box; height: 400px; display: flex; flex-direction: column; }
        .ranking-title { text-align: center; color: var(--gold); font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .rank-item.my-rank { background: rgba(241, 196, 15, 0.2); border-radius: 4px; }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .promotion-modal { background: #fff; color: #333; padding: 20px; border-radius: 5px; width: 80%; max-width: 400px; border: 5px double var(--office); }
        
        input { padding: 12px; border-radius: 5px; border: none; width: 220px; margin-bottom: 15px; font-size: 16px; text-align: center; background: #eee; color: #333; }
        button { padding: 12px 30px; background: var(--office); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #456789; }

        .hud { position: absolute; top: 10px; left: 10px; width: 95%; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; }
        .hp-bar { width: 150px; height: 12px; background: rgba(0,0,0,0.5); border: 1px solid #fff; margin-top: 5px; }
        .hp-fill { height: 100%; background: var(--success); transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="main-layout" ng-controller="GameController">
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>

            <!-- HUD -->
            <div class="hud" ng-if="playerName && gameState === 'PLAYING'">
                <div>
                    <strong>{{playerName}}</strong> ({{levelName}})
                    <div class="hp-bar"><div class="hp-fill" ng-style="{'width': hp + '%'}"></div></div>
                </div>
                <div style="text-align: right; color: var(--gold); font-size: 24px; font-weight: bold;">{{score}}</div>
            </div>

            <!-- 신입 입사 신청서 -->
            <div class="overlay" ng-if="!playerName">
                <h1 style="color: var(--gold);">신규 입사 신청서</h1>
                <p>사원증에 이름을 기재해주세요.</p>
                <input
                    type="text"
                    id="playerNameInput"
                    placeholder="성함 (최대 8자)"
                    maxlength="8">

                <button ng-click="saveName()">
                    사원증 발급 (입사)
                </button>
            </div>

            <!-- 업무 시작 전 -->
            <div class="overlay" ng-show="playerName && gameState === 'START'">
                <h1>오늘의 업무 대기 중</h1>
                <p><strong>{{playerName}}</strong>님, 환영합니다.</p>
                <button ng-click="startGame()">업무 시작 (Enter)</button>
                <p style="font-size: 12px; margin-top: 20px; color: #888;">점프: Space | 슬라이딩: ↓</p>
            </div>

            <!-- 인사 발령 통지서 -->
            <div class="overlay" ng-if="gameState === 'PROMOTION'">
                <div class="promotion-modal">
                    <h2 style="margin:0; color:var(--office);">[인사 발령 통지]</h2>
                    <hr>
                    <p>발령 직급: <strong style="color:var(--danger); font-size: 1.2em;">{{levelName}}</strong></p>
                    <div style="background:#f9f9f9; padding:10px; font-size:14px; text-align:left; border:1px solid #ddd; margin-bottom: 15px;">
                        <strong>지침:</strong><br>{{levelTask}}
                    </div>
                    <button ng-click="resumeGame()">확인 후 업무 복귀</button>
                </div>
            </div>

            <!-- 권고사직 -->
            <div class="overlay" ng-if="gameState === 'GAMEOVER'">
                <h1 style="color:var(--danger);">권고사직 (Game Over)</h1>
                <p style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px;">"{{lastWords}}"</p>
                <h2 style="color:var(--gold);">최종 성과: {{score}}</h2>
                <button ng-click="startGame()">재입사 지원 (Enter)</button>
            </div>
        </div>

        <!-- 사이드 랭킹 패널 -->
        <div id="side-panel">
            <div class="ranking-title">🏆 명예의 전당</div>
            <div style="flex: 1; overflow-y: auto;">
                <div class="rank-item" ng-repeat="r in rankings | limitTo: 10" ng-class="{'my-rank': r.name === playerName && r.score === score && gameState === 'GAMEOVER'}">
                    <span>{{$index + 1}}. {{r.name}}</span>
                    <span style="color: var(--gold); font-weight: bold;">{{r.score}}</span>
                </div>
                <div ng-if="rankings.length === 0" style="text-align: center; color: #888; margin-top: 50px;">데이터 없음</div>
            </div>
        </div>
    </div>

    <script>
        const app = angular.module('RunnerApp', []);

        app.controller('GameController', function($scope, $timeout) {
            console.log("Angular Controller Loaded");
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            $scope.playerName = localStorage.getItem('runner_name');
            $scope.rankings = JSON.parse(localStorage.getItem('runner_rankings') || '[]');
            $scope.gameState = 'START';
            $scope.level = 1; $scope.hp = 100; $scope.score = 0;

            const levelData = [
                { title: "신입", bg: "#2c3e50", task: "시키면 일단 합니다. 하지만 뭘 하는지는 모릅니다." },
                { title: "주니어", bg: "#1e3799", task: "버그를 수정하면 새로운 버그가 두 개 생깁니다." },
                { title: "미들", bg: "#0c2461", task: "기획자의 숨은 의도를 파악하려다 탈모가 옵니다." },
                { title: "시니어", bg: "#b71540", task: "회의실에서 탈출하는 법을 연구하기 시작합니다." },
                { title: "수석", bg: "#4b6584", task: "모든 코드가 엉망으로 보이지만 고칠 기운이 없습니다." },
                { title: "CTO", bg: "#000000", task: "5분이면 되는 거 아녜요? (최종 보스 단계)" }
            ];

            // 장애물 데이터베이스 확장
            const JUMP_LIST = ["요구사항 변경", "긴급 버그 수정", "오늘 배포 가즈아", "API 명세 변경", "UI 깨짐 현상", "로그가 안 찍혀요", "DB 쿼리 튜닝", "테스트 코드 누락", "CSS가 이상해요", "IE 지원되나요?"];
            const SLIDE_LIST = ["긴급 회의 참석", "주간 보고 작성", "팀 회의 (3시간)", "전사 교육 참여", "워크샵(강제)", "타운홀 미팅", "점심 회식", "연봉 협상(?)", "불필요한 티타임", "사내 보안 점검"];
            const BOSS_LIST = [
                "아 근데 처음부터 다시 갈게요", 
                "5분이면 되는 거 아녜요?", 
                "이거 내일 아침까지 가능하죠?", 
                "기능 다 빼고 일정 당깁시다", 
                "원래 되던 기능 아닌가요?", 
                "기존 영향도 없습니다 (거짓말)",
                "어려운 거 아니니까 오늘 해주세요",
                "근데 모바일도 지원되죠?"
            ];

            $scope.saveName = function() {

                const input = document.getElementById('playerNameInput');
                const name = input.value.trim();

                console.log(name);

                if (!name) {
                    alert('이름을 입력하세요.');
                    return;
                }

                $scope.playerName = name;

                localStorage.setItem('runner_name', name);

                $scope.gameState = 'START';

                $scope.$applyAsync();
            };

            let player = { x: 80, y: 300, w: 30, h: 55, dy: 0, jumpPower: 14, gravity: 0.8, jumpCount: 0, isSliding: false };
            let obstacles = [];
            let gameSpeed = 6;
            let frameCount = 0;
            let animationId;

            function initGame() {
                $scope.hp = 100; $scope.score = 0; $scope.level = 1; gameSpeed = 6.5;
                obstacles = []; player.y = 300; player.dy = 0; player.jumpCount = 0; frameCount = 0;
                $scope.updateLevel();
            }

            $scope.updateLevel = function() {
                const d = levelData[Math.min($scope.level - 1, levelData.length - 1)];
                $scope.levelName = d.title; $scope.levelTask = d.task;
            };

            $scope.startGame = function() { initGame(); $scope.gameState = 'PLAYING'; update(); };
            $scope.resumeGame = function() { $scope.gameState = 'PLAYING'; update(); };

            function spawnObstacle() {
                const isBoss = Math.random() < 0.28; // 보스 확률 약간 상향
                const isSlide = !isBoss && Math.random() < 0.38;
                
                let text = "";
                if (isBoss) {
                    text = BOSS_LIST[Math.floor(Math.random() * BOSS_LIST.length)];
                } else if (isSlide) {
                    text = SLIDE_LIST[Math.floor(Math.random() * SLIDE_LIST.length)];
                } else {
                    text = JUMP_LIST[Math.floor(Math.random() * JUMP_LIST.length)];
                }

                ctx.font = isBoss ? "bold 16px Arial" : "14px Arial";
                const w = ctx.measureText(text).width + 30;

                obstacles.push({
                    x: canvas.width + 50, y: isSlide ? 230 : (isBoss ? 240 : 325),
                    w: w, h: isBoss ? 100 : 35, text: text, isBoss: isBoss, isSlide: isSlide,
                    speed: gameSpeed, dmg: isBoss ? 40 : 10
                });
            }

            function update() {
                if ($scope.gameState !== 'PLAYING') return;

                player.dy += player.gravity; player.y += player.dy;
                const groundY = player.isSliding ? 330 : 305;
                if (player.y > groundY) { player.y = groundY; player.dy = 0; player.jumpCount = 0; }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i]; o.x -= o.speed;
                    if (player.x < o.x + o.w && player.x + player.w > o.x &&
                        player.y < o.y + o.h && player.y + (player.isSliding?30:55) > o.y) {
                        $scope.hp -= o.dmg; $scope.lastWords = o.text; obstacles.splice(i, 1);
                        if ($scope.hp <= 0) gameOver();
                        $scope.$apply(); continue;
                    }
                    if (o.x + o.w < 0) {
                        obstacles.splice(i, 1); $scope.score += 10;
                        if ($scope.score > 0 && $scope.score % 100 === 0) {
                            $scope.gameState = 'PROMOTION'; $scope.level++; gameSpeed += 2.0; $scope.updateLevel();
                        }
                        $scope.$apply();
                    }
                }

                if (frameCount % Math.max(25, 75 - (gameSpeed * 3)) === 0) spawnObstacle();
                frameCount++; draw(); animationId = requestAnimationFrame(update);
            }

            function draw() {
                const d = levelData[Math.min($scope.level - 1, levelData.length - 1)];
                ctx.fillStyle = d.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#333"; ctx.fillRect(0, 360, canvas.width, 40);

                const px = player.x, py = player.y;
                ctx.fillStyle = "#ffdbac"; ctx.fillRect(px + 10, py, 15, 15);
                ctx.fillStyle = player.isSliding ? "#e67e22" : "#3498db";
                if (player.isSliding) { ctx.fillRect(px, py + 15, 40, 20); }
                else { ctx.fillRect(px + 5, py + 15, 25, 30); ctx.fillStyle = "#2c3e50"; ctx.fillRect(px + 5, py + 45, 10, 15); ctx.fillRect(px + 20, py + 45, 10, 15); }

                obstacles.forEach(o => {
                    ctx.fillStyle = o.isBoss ? "#e74c3c" : (o.isSlide ? "#f1c40f" : "#fff");
                    ctx.fillRect(o.x, o.y, o.w, o.h);
                    ctx.fillStyle = (o.isBoss || o.isSlide) ? "#fff" : "#333";
                    ctx.textAlign = "center"; ctx.fillText(o.text, o.x + o.w/2, o.y + o.h/1.6);
                });
            }

            function gameOver() {
                $scope.gameState = 'GAMEOVER';
                cancelAnimationFrame(animationId);
                $scope.rankings.push({ name: $scope.playerName, score: $scope.score });
                $scope.rankings.sort((a, b) => b.score - a.score);
                $scope.rankings = $scope.rankings.slice(0, 20);
                localStorage.setItem('runner_rankings', JSON.stringify($scope.rankings));
                $scope.$apply();
            }

            window.addEventListener('keydown', e => {
                if (e.code === 'Enter') {
                    if (!$scope.playerName) return;
                    if ($scope.gameState === 'START' || $scope.gameState === 'GAMEOVER') $scope.$apply(() => $scope.startGame());
                    if ($scope.gameState === 'PROMOTION') $scope.$apply(() => $scope.resumeGame());
                }
                if ($scope.gameState === 'PLAYING') {
                    if (e.code === 'Space' && player.jumpCount < 2) { player.dy = -player.jumpPower; player.jumpCount++; player.isSliding = false; }
                    if (e.code === 'ArrowDown') player.isSliding = true;
                }
                if (['Space', 'ArrowDown', 'ArrowUp', 'Enter'].includes(e.code)) e.preventDefault();
            });
            window.addEventListener('keyup', e => { if (e.code === 'ArrowDown') player.isSliding = false; });
            draw();
        });
    </script>
</body>
</html>
