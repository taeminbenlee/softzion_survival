<!DOCTYPE html>
<html lang="ko" ng-app="RunnerApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요구사항 러너 - 시니어 모드</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2c3e50; font-family: 'Malgun Gothic', sans-serif; }
        #game-container { position: relative; width: 800px; height: 400px; margin: 50px auto; border: 4px solid #ecf0f1; background-color: #f4f7f6; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { display: flex; justify-content: space-between; padding: 15px 25px; color: #2c3e50; font-weight: bold; font-size: 18px; background: rgba(255, 255, 255, 0.7); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0, 0, 0, 0.85); color: white; padding: 30px 50px; border-radius: 10px; pointer-events: auto; width: 60%; }
        .level-up-msg { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); color: #e67e22; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -50px); } }
    </style>
</head>
<body ng-controller="GameController">

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="ui-layer">
            <div class="hud">
                <div>Level: {{levelName}} (Lv.{{level}})</div>
                <div>Score: {{score}}</div>
                <div>High Score: {{highScore}}</div>
            </div>

            <div class="overlay" ng-if="gameState === 'START'">
                <h1>🏃 요구사항 러너</h1>
                <p style="color: #3498db; font-weight: bold;">[시니어 업데이트: 3단 점프 가능!]</p>
                <p>엔터를 눌러 출근하세요.</p>
                <p><small>점프: 스페이스바 (공중에서 연속 3번 가능)</small></p>
            </div>

            <div class="overlay" ng-if="gameState === 'GAMEOVER'">
                <h1 style="color: #e74c3c;">Game Over</h1>
                <p>"결국 요구사항에 치였습니다."</p>
                <p>최종 점수: {{score}}</p>
                <p style="color: #f1c40f;">엔터를 눌러 다시 입사하세요.</p>
            </div>

            <div class="level-up-msg" ng-if="showLevelUp">
                축하합니다! {{levelName}} 개발자가 되었습니다.
            </div>
        </div>
    </div>

    <script>
        const app = angular.module('RunnerApp', []);

        app.controller('GameController', function($scope, $timeout) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            $scope.gameState = 'START';
            $scope.score = 0;
            $scope.highScore = localStorage.getItem('highScore') || 0;
            $scope.level = 1;
            $scope.levelName = "신입";
            $scope.showLevelUp = false;

            const levelTitles = ["", "신입", "주니어", "미들", "시니어", "선임", "수석"];
            const obstaclesList = ["간단한 수정", "긴급 요청", "오늘 배포", "요구사항 변경", "회의 추가", "기획 변경", "이틀이면 되죠?", "기존 영향 없습니다"];

            let animationId;
            let player = {
                x: 50,
                y: 300,
                width: 40,
                height: 55,
                dy: 0,
                jumpForce: 13, // 점프력 상향
                gravity: 0.5,  // 중력 하향 (더 부드럽게)
                jumpCount: 0,  // 점프 횟수 추적
                color: '#3498db'
            };

            let obstacles = [];
            let gameSpeed = 5;
            let frameCount = 0;

            function init() {
                $scope.score = 0;
                $scope.level = 1;
                $scope.levelName = levelTitles[1];
                gameSpeed = 5.5;
                obstacles = [];
                player.y = 300;
                player.dy = 0;
                player.jumpCount = 0;
                frameCount = 0;
            }

            function spawnObstacle() {
                const isBoss = Math.random() < 0.15; // 보스 확률 약간 상승
                const text = isBoss ? "아 근데 처음부터 다시 갈게요" : obstaclesList[Math.floor(Math.random() * obstaclesList.length)];
                
                ctx.font = isBoss ? "bold 22px Arial" : "16px Arial";
                const textWidth = ctx.measureText(text).width + 30;

                const obs = {
                    x: canvas.width,
                    y: isBoss ? 260 : 330, // 보스의 높이를 조절하여 점프로 넘기 쉽게 변경
                    text: text,
                    isBoss: isBoss,
                    width: textWidth,
                    height: isBoss ? 80 : 40,
                    speed: gameSpeed
                };
                obstacles.push(obs);
            }

            function update() {
                if ($scope.gameState !== 'PLAYING') return;

                // 물리 엔진
                player.dy += player.gravity;
                player.y += player.dy;

                if (player.y > 300) {
                    player.y = 300;
                    player.dy = 0;
                    player.jumpCount = 0; // 바닥에 닿으면 점프 초기화
                }

                // 장애물 처리
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.x -= o.speed;

                    // 충돌 감지 (판정 최적화: 실제 박스보다 약간 작게)
                    const padding = 10;
                    if (player.x + padding < o.x + o.width - padding &&
                        player.x + player.width - padding > o.x + padding &&
                        player.y + padding < o.y + o.height - padding &&
                        player.y + player.height - padding > o.y + padding) {
                        gameOver();
                    }

                    if (o.x + o.width < 0) {
                        obstacles.splice(i, 1);
                        $scope.$apply(() => {
                            $scope.score += 10;
                            checkLevelUp();
                        });
                    }
                }

                if (frameCount % Math.max(40, 110 - (gameSpeed * 5)) === 0) {
                    spawnObstacle();
                }

                frameCount++;
                draw();
                animationId = requestAnimationFrame(update);
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 바닥선
                ctx.strokeStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.moveTo(0, 355);
                ctx.lineTo(800, 355);
                ctx.stroke();

                // 플레이어 그리기
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x + 25, player.y + 10, 8, 8); // 눈

                // 장애물 그리기
                obstacles.forEach(o => {
                    ctx.fillStyle = o.isBoss ? "#e74c3c" : "#ffffff";
                    ctx.strokeStyle = "#2c3e50";
                    ctx.lineWidth = 2;
                    ctx.fillRect(o.x, o.y, o.width, o.height);
                    ctx.strokeRect(o.x, o.y, o.width, o.height);

                    ctx.fillStyle = o.isBoss ? "#ffffff" : "#2c3e50";
                    ctx.font = o.isBoss ? "bold 18px Arial" : "15px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(o.text, o.x + o.width/2, o.y + o.height/1.6);
                });
            }

            function checkLevelUp() {
                const newLevel = Math.min(6, Math.floor($scope.score / 200) + 1);
                if (newLevel > $scope.level) {
                    $scope.level = newLevel;
                    $scope.levelName = levelTitles[$scope.level];
                    gameSpeed += 1.2;
                    $scope.showLevelUp = true;
                    $timeout(() => { $scope.showLevelUp = false; }, 2000);
                }
            }

            function gameOver() {
                $scope.gameState = 'GAMEOVER';
                cancelAnimationFrame(animationId);
                if ($scope.score > $scope.highScore) {
                    $scope.highScore = $scope.score;
                    localStorage.setItem('highScore', $scope.highScore);
                }
                $scope.$apply();
            }

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault(); // 스크롤 방지
                    if ($scope.gameState === 'PLAYING' && player.jumpCount < 3) { // 3단 점프
                        player.dy = -player.jumpForce;
                        player.jumpCount++;
                    }
                }
                if (e.code === 'Enter') {
                    if ($scope.gameState === 'START' || $scope.gameState === 'GAMEOVER') {
                        init();
                        $scope.gameState = 'PLAYING';
                        $scope.$apply();
                        update();
                    }
                }
            });

            draw(); // 초기 화면
        });
    </script>
</body>
</html>
